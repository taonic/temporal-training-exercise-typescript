# fly.toml — serves the Vue course site and the course-sandbox-runner /api from
# one machine. Set the Daytona key before the first deploy:
#   fly secrets set DAYTONA_KEY=...

app = "temporal-training-exercise-typescript"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  COURSE_DIST_DIR = "/app/course-dist"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
